volumes:
  pgvol:

networks:
  pgnet:

services:
  pgdb:
    image: postgres:18.3-alpine3.23
    networks:
      - pgnet
    ports:
      - 15432:5432
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpassword

  adminer:
    image: adminer:latest
    networks:
      - pgnet
    ports:
      - 18080:8080
    environment:
      - ADMINER_DEFAULT_SERVER=pgdb
