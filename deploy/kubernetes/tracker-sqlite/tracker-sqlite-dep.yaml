apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracker-sqlite-dep
  labels:
    app.kubernetes.io/name: expensetracker
    rajware.net/variation: sqlite
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: expensetracker
      rajware.net/variation: sqlite
      app.kubernetes.io/component: application
  template:
    metadata:
      labels:
        app.kubernetes.io/name: expensetracker
        rajware.net/variation: sqlite
        app.kubernetes.io/component: application
    spec:
      volumes:
        - name: sqlitevol
          persistentVolumeClaim:
            claimName: tracker-sqlite-pvc
      containers:
        - name: app
          image: quay.io/rajware/expensetracker-go:latest
          volumeMounts:
            - name: sqlitevol
              mountPath: /app/data
          env:
            - name: ET_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: tracker-sqlite-secret
                  key: hmacKey
